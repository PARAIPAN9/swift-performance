<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} · {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
  <link rel="stylesheet" href="{{ "/assets/css/main.css" | relative_url }}">
  <link rel="icon" type="image/svg+xml" href="{{ "/assets/sp-badge-dark.svg" | relative_url }}" media="(prefers-color-scheme: dark)">
  <link rel="icon" type="image/svg+xml" href="{{ "/assets/sp-badge-light.svg" | relative_url }}" media="(prefers-color-scheme: light)">
  {% feed_meta %}
  {% seo %}
</head>
<body>
  {% include header.html %}
  <main class="page-content">
    {{ content }}
  </main>
  {% include footer.html %}
  <script data-goatcounter="https://swift-performance.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</body>
</html>
