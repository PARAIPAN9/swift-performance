---
layout: default
---

<article class="post">
  <header class="post-header">
    <div class="post-meta">{{ page.date | date: "%B %-d, %Y" }}{% if page.categories.size > 0 %} &nbsp;·&nbsp; {{ page.categories | join: ", " }}{% endif %}</div>
    <h1>{{ page.title }}</h1>
    {% if page.description %}<p class="post-description">{{ page.description }}</p>{% endif %}
  </header>

  <div class="post-content">
    {{ content }}
  </div>
</article>
